<style>
        body {
            background-color: #faf8ff;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .input-focus-ring:focus {
            outline: 2px solid #2563eb;
            outline-offset: -1px;
        }
        .brand-italic {
            font-family: 'EB Garamond', serif;
            font-style: italic;
            font-weight: 700;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen items-center justify-center font-body-md text-on-surface">
<!-- Atmospheric Background Element -->
<div class="fixed inset-0 overflow-hidden pointer-events-none -z-10">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-secondary-container opacity-20 blur-[100px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-primary-fixed opacity-30 blur-[120px]"></div>
</div>
<!-- Login Container -->
<main class="w-full max-w-[400px] px-gutter flex flex-col items-center">
<!-- Brand Header -->
<header class="mb-12 text-center">
<h1 class="brand-italic text-[48px] text-primary tracking-tight mb-2">ProFlow</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Focus. Execute. Deliver.</p>
</header>
<!-- Form Card -->
<div class="w-full bg-white border border-outline-variant rounded-lg p-8 shadow-[0_4px_12px_rgba(0,0,0,0.05)]">
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-6">Sign In</h2>
<form class="space-y-5" onsubmit="return false;">
<!-- Email Address -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[18px]">mail</span>
<input class="w-full h-11 pl-10 pr-4 bg-background border border-outline-variant rounded-lg text-body-md input-focus-ring transition-all placeholder:text-outline" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant block" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[18px]">lock</span>
<input class="w-full h-11 pl-10 pr-10 bg-background border border-outline-variant rounded-lg text-body-md input-focus-ring transition-all placeholder:text-outline" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[18px]">visibility</span>
</button>
</div>
</div>
<!-- Sign In Action -->
<button class="w-full h-11 bg-primary-container text-white font-label-md text-body-md font-semibold rounded-lg hover:bg-primary transition-colors active:scale-[0.98] mt-4 flex items-center justify-center gap-2" type="submit">
                    Sign In
                </button>
</form>
</div>
<!-- Secondary Link -->
<footer class="mt-8 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                New to the workspace? 
                <a class="text-primary font-semibold hover:underline ml-1" href="#">Create an account</a>
</p>
</footer>
</main>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input');
            const submitBtn = document.querySelector('button[type="submit"]');

            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.parentElement.classList.add('scale-[1.01]');
                });
                input.addEventListener('blur', () => {
                    input.parentElement.classList.remove('scale-[1.01]');
                });
            });

            // Password Toggle Logic
            const togglePass = document.querySelector('button .material-symbols-outlined');
            const passInput = document.getElementById('password');
            let isVisible = false;

            togglePass?.parentElement.addEventListener('click', () => {
                isVisible = !isVisible;
                passInput.type = isVisible ? 'text' : 'password';
                togglePass.textContent = isVisible ? 'visibility_off' : 'visibility';
            });
        });
    </script>
</body></html>
