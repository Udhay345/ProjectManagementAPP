<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up | ProFlow</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@1,400..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        theme: {
          extend: {
            "colors": {
                    "secondary-fixed": "#d3e4fe",
                    "on-primary-container": "#eeefff",
                    "inverse-surface": "#283044",
                    "tertiary-fixed-dim": "#c4c7c9",
                    "outline": "#737686",
                    "surface-container-high": "#e2e7ff",
                    "outline-variant": "#c3c6d7",
                    "on-primary-fixed": "#00174b",
                    "on-error-container": "#93000a",
                    "surface-bright": "#faf8ff",
                    "on-background": "#131b2e",
                    "on-secondary-fixed": "#0b1c30",
                    "on-tertiary": "#ffffff",
                    "primary": "#004ac6",
                    "surface-dim": "#d2d9f4",
                    "on-secondary": "#ffffff",
                    "primary-fixed-dim": "#b4c5ff",
                    "on-secondary-container": "#54647a",
                    "secondary-container": "#d0e1fb",
                    "inverse-primary": "#b4c5ff",
                    "on-tertiary-container": "#eff1f3",
                    "on-primary": "#ffffff",
                    "surface": "#faf8ff",
                    "secondary": "#505f76",
                    "background": "#faf8ff",
                    "surface-container-lowest": "#ffffff",
                    "primary-fixed": "#dbe1ff",
                    "on-surface-variant": "#434655",
                    "on-surface": "#131b2e",
                    "error": "#ba1a1a",
                    "primary-container": "#2563eb",
                    "on-tertiary-fixed-variant": "#444749",
                    "on-tertiary-fixed": "#191c1e",
                    "inverse-on-surface": "#eef0ff",
                    "surface-container-low": "#f2f3ff",
                    "surface-variant": "#dae2fd",
                    "surface-container-highest": "#dae2fd",
                    "secondary-fixed-dim": "#b7c8e1",
                    "on-secondary-fixed-variant": "#38485d",
                    "surface-container": "#eaedff",
                    "tertiary-container": "#6b6e70",
                    "tertiary": "#525657",
                    "error-container": "#ffdad6",
                    "on-error": "#ffffff",
                    "surface-tint": "#0053db",
                    "tertiary-fixed": "#e0e3e5",
                    "on-primary-fixed-variant": "#003ea8"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "unit": "4px",
                    "sidebar-width": "260px",
                    "cell-padding-x": "12px",
                    "gutter": "16px",
                    "cell-padding-y": "8px",
                    "container-max": "1200px"
            },
            "fontFamily": {
                    "body-md": ["Geist", "sans-serif"],
                    "headline-sm": ["Geist", "sans-serif"],
                    "headline-lg": ["Geist", "sans-serif"],
                    "display": ["Geist", "sans-serif"],
                    "label-md": ["Geist", "sans-serif"],
                    "headline-lg-mobile": ["Geist", "sans-serif"],

            "fontSize": {

                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "display": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}]

          }
        }
      }

<style>
        body {
            background-color: #faf8ff;
            color: #131b2e;
            font-family: 'Geist', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .form-input-focus:focus {
            outline: 2px solid #2563eb;
            outline-offset: -1px;
            border-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen bg-surface-container-low">
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center p-gutter">
<!-- Brand Header Section -->
<div class="mb-10 text-center animate-fade-in">
<h1 class="font-brand-italic text-[42px] italic text-primary leading-none tracking-tight">ProFlow</h1>
<p class="font-body-md text-on-surface-variant mt-2">Elevate your workspace efficiency.</p>
</div>
<!-- Sign Up Card -->
<div class="w-full max-w-[400px] bg-surface-container-lowest rounded-lg p-8 border border-outline-variant shadow-sm transition-all duration-300">
<!-- Title -->
<div class="mb-8">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Sign Up</h2>
<p class="font-body-md text-on-surface-variant mt-1">Join the next generation of knowledge workers.</p>
</div>
<!-- Form -->
<form action="#" class="space-y-6" onsubmit="event.preventDefault()">
<!-- Full Name Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface uppercase tracking-wider block" for="full_name">Full Name</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors text-[20px]">person</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focus:ring-0 form-input-focus transition-all duration-200" id="full_name" name="full_name" placeholder="Enter your full name" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface uppercase tracking-wider block" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors text-[20px]">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focus:ring-0 form-input-focus transition-all duration-200" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface uppercase tracking-wider block" for="password">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors text-[20px]">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focus:ring-0 form-input-focus transition-all duration-200" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<div class="pt-2">
<button class="w-full bg-primary-container text-white py-3.5 rounded-lg font-headline-sm text-headline-sm hover:bg-primary transition-all active:scale-[0.98] duration-150 shadow-md" type="submit">
                        Create Account
                    </button>
</div>
</form>
<!-- Secondary Action -->
<div class="mt-8 text-center border-t border-outline-variant pt-6">
<p class="font-body-md text-on-surface-variant">
                    Already have an account? 
                    <a class="text-primary font-semibold hover:underline decoration-2 underline-offset-4 ml-1" href="#">Sign in</a>
</p>
</div>
</div>
<!-- Decorative Element: Atmospheric Background Shader -->
<div class="fixed inset-0 -z-10 pointer-events-none opacity-40">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary-fixed rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-[30%] h-[30%] bg-secondary-fixed rounded-full blur-[100px]"></div>
</div>
</main>
<!-- Footer Identity (Subtle) -->
<footer class="py-gutter flex justify-center items-center">
<div class="flex items-center gap-2 text-on-surface-variant opacity-60">
<span class="material-symbols-outlined text-[16px]">verified_user</span>
<span class="font-label-md text-label-md">Secure Infrastructure by ProFlow</span>
</div>
</footer>
<script>
        // Simple Interaction Logic
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('translate-y-[-2px]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('translate-y-[-2px]');
            });
        });

        // Password visibility toggle simulation
        const toggleBtn = document.querySelector('button[type="button"]');
        const passInput = document.getElementById('password');
        if (toggleBtn && passInput) {
            toggleBtn.addEventListener('click', () => {
                const isPassword = passInput.type === 'password';
                passInput.type = isPassword ? 'text' : 'password';
                toggleBtn.children[0].textContent = isPassword ? 'visibility_off' : 'visibility';
            });
        }
    </script>
</body></html>
